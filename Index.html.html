<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>FM Field</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --black:#111;--dark:#1A1A1A;--card:#222;--border:#333;
  --red:#8B1A1A;--redl:#B02020;--grey:#888;--lgrey:#AAA;
  --white:#F5F5F5;--green:#2A6A3A;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;width:100%;background:var(--black);color:var(--white);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;
  overflow:hidden;touch-action:manipulation;}

#app{display:flex;flex-direction:column;height:100vh;width:100vw;}

/* HEADER */
#header{
  height:48px;background:var(--dark);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 12px;flex-shrink:0;
  padding-top:env(safe-area-inset-top,0px);
}
#hdr-left{font-size:11px;color:var(--grey);line-height:1.4;}
#hdr-left span{display:block;color:var(--lgrey);font-size:12px;font-weight:600;}
#hdr-right{display:flex;gap:8px;align-items:center;}
.hdr-btn{background:var(--card);border:1px solid var(--border);color:var(--lgrey);
  font-size:12px;padding:6px 11px;border-radius:8px;cursor:pointer;}
.add-btn-hdr{background:var(--red);border:none;color:var(--white);
  font-size:18px;width:34px;height:34px;border-radius:8px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-weight:700;}

/* CONTENT */
#content{flex:1;overflow:hidden;position:relative;}
.tab-panel{position:absolute;inset:0;display:none;flex-direction:column;padding:10px 12px 8px;gap:8px;}
.tab-panel.active{display:flex;}

/* TAB BAR */
#tabbar{
  background:var(--dark);border-top:1px solid var(--border);
  display:grid;grid-template-columns:repeat(4,1fr);flex-shrink:0;
  padding-bottom:var(--safe-bottom);
}
.tab-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;cursor:pointer;border:none;background:transparent;
  color:var(--grey);font-size:10px;font-weight:500;padding:8px 4px;}
.tab-btn .ti{font-size:17px;line-height:1;}
.tab-btn.active{color:var(--redl);}

/* GROUP BAR */
.group-bar{display:flex;gap:6px;flex-shrink:0;}
.g-btn{flex:1;padding:10px 4px;border-radius:10px;background:var(--card);
  border:1.5px solid var(--border);color:var(--lgrey);font-size:14px;
  font-weight:700;cursor:pointer;text-align:center;transition:all .15s;}
.g-btn.active{background:var(--red);border-color:var(--redl);color:var(--white);}

/* PA8 */
.pa8-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;flex:1;}
.pa8-btn{border-radius:12px;border:1.5px solid var(--border);background:var(--card);
  color:var(--white);cursor:pointer;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:4px;padding:8px 4px;transition:all .12s;}
.pa8-btn:active{transform:scale(.94);background:var(--red);border-color:var(--redl);}
.pa8-code{font-size:18px;font-weight:800;}
.pa8-label{font-size:10px;color:var(--grey);text-align:center;line-height:1.2;}

/* SUBLAYER */
#sublayer-strip{display:none;background:var(--dark);border:1.5px solid var(--red);
  border-radius:12px;padding:8px;flex-shrink:0;}
#sublayer-strip.visible{display:block;}
#sl-title{font-size:11px;color:var(--grey);margin-bottom:7px;text-align:center;}
#sl-btns{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.sl-btn{background:var(--card);border:1px solid var(--border);color:var(--white);
  font-size:11px;font-weight:600;padding:9px 3px;border-radius:8px;cursor:pointer;text-align:center;}
.sl-btn:active{background:var(--red);}
.sl-skip{color:var(--grey);font-size:12px;}

/* LAST ENTRY */
.last-entry{height:30px;display:flex;align-items:center;justify-content:center;
  font-size:11px;color:var(--lgrey);flex-shrink:0;background:var(--dark);
  border-radius:8px;border:1px solid var(--border);font-family:'Courier New',monospace;}
.last-entry.flash{color:#4CAF50;border-color:#4CAF50;}

/* SHADOW */
.shadow-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;flex-shrink:0;}
.sh-btn{background:var(--card);border:1.5px solid var(--border);color:var(--white);
  border-radius:10px;padding:9px 4px;cursor:pointer;display:flex;flex-direction:column;
  align-items:center;gap:3px;transition:all .12s;}
.sh-btn.selected{background:var(--red);border-color:var(--redl);}
.sh-code{font-size:14px;font-weight:800;}
.sh-label{font-size:9px;color:var(--grey);text-align:center;line-height:1.2;}
.sh-btn.selected .sh-label{color:#ffaaaa;}

.conf-row{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;flex-shrink:0;}
.conf-btn{padding:11px;border-radius:10px;border:1.5px solid var(--border);
  background:var(--card);color:var(--white);font-size:14px;font-weight:700;
  cursor:pointer;text-align:center;transition:all .12s;}
.conf-btn.selected{border-color:var(--redl);background:var(--red);}
.conf-sub{font-size:9px;color:var(--grey);display:block;margin-top:2px;}
.conf-btn.selected .conf-sub{color:#ffaaaa;}

/* PARTICIPANT ROW */
.p-row{display:flex;flex-wrap:wrap;gap:6px;flex-shrink:0;min-height:44px;
  background:var(--dark);border-radius:10px;padding:6px;
  align-items:center;}
.p-row-empty{font-size:11px;color:var(--border);padding:4px 6px;}
.p-btn{padding:8px 10px;border-radius:8px;border:1.5px solid var(--border);
  background:var(--card);color:var(--white);font-size:12px;font-weight:700;
  cursor:pointer;transition:all .12s;white-space:nowrap;}
.p-btn.selected{background:var(--red);border-color:var(--redl);}

.sh-log-btn{background:var(--card);border:1.5px solid var(--border);border-radius:12px;
  color:var(--grey);font-size:15px;font-weight:700;padding:13px;cursor:pointer;flex-shrink:0;}
.sh-log-btn.ready{background:var(--green);border-color:var(--green);color:var(--white);}

/* ORG */
.org-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;flex:1;}
.org-btn{border-radius:12px;border:1.5px solid var(--border);background:var(--card);
  color:var(--white);cursor:pointer;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:4px;padding:8px 4px;transition:all .12s;}
.org-btn.selected{background:var(--red);border-color:var(--redl);}
.org-code{font-size:15px;font-weight:800;}
.org-label{font-size:9px;color:var(--grey);text-align:center;line-height:1.2;}
.org-btn.selected .org-label{color:#ffaaaa;}
.org-log-btn{background:var(--card);border:1.5px solid var(--border);border-radius:12px;
  color:var(--grey);font-size:15px;font-weight:700;padding:13px;cursor:pointer;flex-shrink:0;}
.org-log-btn.ready{background:var(--green);border-color:var(--green);color:var(--white);}

/* LOG */
.log-list{flex:1;overflow-y:auto;background:var(--dark);border-radius:12px;
  border:1px solid var(--border);padding:8px;font-family:'Courier New',monospace;
  font-size:12px;color:var(--lgrey);line-height:1.9;}
.log-entry{border-bottom:1px solid #2A2A2A;padding:2px 0;}
.log-entry:last-child{border-bottom:none;}
.lt{color:var(--grey);}
.lg{color:var(--redl);font-weight:700;}
.ls{color:var(--white);font-weight:600;}
.lsh{color:#88AAFF;}
.room-row{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;flex-shrink:0;}
.room-btn{background:var(--card);border:1.5px solid var(--border);color:var(--white);
  font-size:18px;font-weight:700;padding:9px;border-radius:10px;cursor:pointer;text-align:center;}
.room-btn:active{background:#333;}
.rlabel{font-size:9px;color:var(--grey);display:block;margin-top:2px;}
.copy-btn{background:var(--red);border:none;border-radius:12px;color:var(--white);
  font-size:15px;font-weight:700;padding:13px;cursor:pointer;flex-shrink:0;}
.copy-btn.copied{background:var(--green);}

/* ADD PARTICIPANT MODAL */
#add-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;
  flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:12px;}
#add-modal.open{display:flex;}
.modal-title{font-size:18px;font-weight:700;color:var(--white);text-align:center;}
.modal-sub{font-size:12px;color:var(--grey);text-align:center;}
#add-name-input{width:100%;background:var(--card);border:1.5px solid var(--border);
  border-radius:12px;padding:16px;color:var(--white);font-size:18px;outline:none;
  text-align:center;}
#add-name-input:focus{border-color:var(--red);}
.modal-group-row{display:flex;gap:8px;width:100%;}
.mg-btn{flex:1;padding:14px;border-radius:10px;background:var(--card);
  border:1.5px solid var(--border);color:var(--white);font-size:15px;font-weight:700;
  cursor:pointer;text-align:center;}
.mg-btn.selected{background:var(--red);border-color:var(--redl);}
.modal-confirm{width:100%;background:var(--green);border:none;border-radius:12px;
  color:var(--white);font-size:16px;font-weight:700;padding:16px;cursor:pointer;opacity:.5;}
.modal-confirm.ready{opacity:1;}
.modal-cancel{background:transparent;border:1px solid var(--border);border-radius:12px;
  color:var(--grey);font-size:14px;padding:12px;cursor:pointer;width:100%;}

/* SETTINGS */
#settings-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);
  z-index:100;flex-direction:column;padding:16px;gap:10px;overflow-y:auto;
  padding-bottom:calc(16px + var(--safe-bottom));}
#settings-overlay.open{display:flex;}
.s-title{font-size:18px;font-weight:700;color:var(--white);}
.s-sec{font-size:11px;color:var(--grey);margin-top:4px;}
.s-field{background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:12px;color:var(--white);font-size:15px;width:100%;outline:none;}
.s-field:focus{border-color:var(--red);}
.s-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.save-btn{background:var(--red);border:none;border-radius:12px;color:var(--white);
  font-size:16px;font-weight:700;padding:16px;cursor:pointer;margin-top:4px;}
.clear-btn{background:transparent;border:1.5px solid var(--border);border-radius:12px;
  color:var(--grey);font-size:14px;padding:12px;cursor:pointer;}
.sdiv{height:1px;background:var(--border);margin:4px 0;}
</style>
</head>
<body>
<div id="app">

<div id="header">
  <div id="hdr-left">
    <span id="hdr-client">FlowMatrix</span>
    <span id="hdr-meta">Tap Settings to configure</span>
  </div>
  <div id="hdr-right">
    <button class="hdr-btn" onclick="openSettings()">⚙</button>
    <button class="add-btn-hdr" onclick="openAdd()" title="Add participant">+</button>
  </div>
</div>

<div id="content">

  <!-- PA8 -->
  <div id="tab-pa8" class="tab-panel active">
    <div class="group-bar" id="pa8-groups"></div>
    <div class="pa8-grid" id="pa8-grid"></div>
    <div id="sublayer-strip">
      <div id="sl-title"></div>
      <div id="sl-btns"></div>
    </div>
    <div class="last-entry" id="pa8-last">—</div>
  </div>

  <!-- SHADOW -->
  <div id="tab-shadow" class="tab-panel">
    <div class="group-bar" id="sh-groups"></div>
    <div class="shadow-grid" id="sh-grid"></div>
    <div class="conf-row" id="sh-conf"></div>
    <div class="p-row" id="sh-prow"></div>
    <button class="sh-log-btn" id="sh-log-btn" onclick="logShadow()">LOG SHADOW ENTRY</button>
    <div class="last-entry" id="sh-last">—</div>
  </div>

  <!-- ORG -->
  <div id="tab-org" class="tab-panel">
    <div class="group-bar" id="org-groups"></div>
    <div class="org-grid" id="org-grid"></div>
    <div class="conf-row" id="org-conf"></div>
    <button class="org-log-btn" id="org-log-btn" onclick="logOrg()">LOG ORG DYNAMIC</button>
    <div class="last-entry" id="org-last">—</div>
  </div>

  <!-- LOG -->
  <div id="tab-log" class="tab-panel">
    <div class="room-row" id="room-row"></div>
    <div class="log-list" id="log-list"></div>
    <button class="copy-btn" id="copy-btn" onclick="copyLog()">COPY SESSION LOG</button>
  </div>

</div>

<div id="tabbar">
  <button class="tab-btn active" onclick="switchTab('pa8',this)">
    <span class="ti">⬡</span>PA-8
  </button>
  <button class="tab-btn" onclick="switchTab('shadow',this)">
    <span class="ti">◈</span>SHADOW
  </button>
  <button class="tab-btn" onclick="switchTab('org',this)">
    <span class="ti">⬡⬡</span>ORG
  </button>
  <button class="tab-btn" onclick="switchTab('log',this)">
    <span class="ti">≡</span>LOG
  </button>
</div>

</div>

<!-- ADD PARTICIPANT MODAL -->
<div id="add-modal">
  <div class="modal-title">Add Participant</div>
  <div class="modal-sub">Name or initials · assign to group</div>
  <input id="add-name-input" placeholder="Name / initials" maxlength="20"
    oninput="updateAddBtn()" autocomplete="off" autocorrect="off" autocapitalize="words"/>
  <div class="modal-group-row" id="add-group-row"></div>
  <button class="modal-confirm" id="add-confirm-btn" onclick="confirmAdd()">ADD TO GROUP</button>
  <button class="modal-cancel" onclick="closeAdd()">Cancel</button>
</div>

<!-- SETTINGS -->
<div id="settings-overlay">
  <div class="s-title">⚙ Settings</div>
  <div class="sdiv"></div>
  <div class="s-sec">CLIENT &amp; ACTIVITY</div>
  <input class="s-field" id="s-client" placeholder="Client name or code"/>
  <input class="s-field" id="s-activity" placeholder="Activity name"/>
  <div class="s-row">
    <div>
      <div class="s-sec">SESSION #</div>
      <input class="s-field" id="s-sess" type="number" value="1" min="1"/>
    </div>
    <div>
      <div class="s-sec">GROUPS</div>
      <select class="s-field" id="s-groups">
        <option value="2">2 Groups</option>
        <option value="3">3 Groups</option>
        <option value="4" selected>4 Groups</option>
      </select>
    </div>
  </div>
  <div class="sdiv"></div>
  <div class="s-sec">PARTICIPANTS (manage during session with + button)</div>
  <div id="s-p-list" style="background:var(--card);border-radius:10px;padding:10px;
    font-size:12px;color:var(--grey);min-height:40px;"></div>
  <div class="sdiv"></div>
  <button class="save-btn" onclick="saveSettings()">SAVE &amp; START</button>
  <button class="clear-btn" onclick="clearSession()">↺ Clear Log · New Session</button>
</div>

<script>
// ── DATA ────────────────────────────────────────────────────────
const PA8_DATA=[
  {code:'FR',label:'Friction', sub:[['Ro-Fr','Role'],['De-Fr','Decision'],['Fl-Fr','Flow']]},
  {code:'DR',label:'Drift',    sub:[['In-Dr','Intent'],['Lo-Dr','Logic'],['Ro-Dr','Role']]},
  {code:'FG',label:'Fragment', sub:[['De-Fg','Decision'],['Ro-Fg','Role'],['Le-Fg','Leadership']]},
  {code:'FC',label:'Fracture', sub:[['Ro-Fc','Role'],['De-Fc','Decision'],['Tr-Fc','Trust']]},
  {code:'CO',label:'Collapse', sub:[['De-Co','Decision'],['Ro-Co','Role'],['In-Co','Info']]},
  {code:'BR',label:'Break',    sub:[['Co-Br','Conflict'],['Ch-Br','Chaos'],['Ov-Br','Overdrive']]},
];
const SH_DATA=[
  {code:'AN',label:'Anchor',   sub:'Informal authority'},
  {code:'VT',label:'Veto',     sub:'Blocks quietly'},
  {code:'BK',label:'Broker',   sub:'Controls info'},
  {code:'SH',label:'Shield',   sub:'Absorbs blame'},
  {code:'MI',label:'Mirror',   sub:'Reflects power'},
  {code:'EX',label:'Exile',    sub:'Marginalised'},
  {code:'HO',label:'H.Override',sub:'Cultural auth'},
];
const ORG_DATA=[
  {code:'PT',label:'Power\nTopology'},
  {code:'UR',label:'Unwritten\nRule'},
  {code:'PS',label:'Protected\nStory'},
  {code:'IA',label:'Informal\nAlliance'},
  {code:'SF',label:'Scapegoat\nFn.'},
  {code:'FM',label:'Frozen\nMoment'},
];
const ROOM_SYMS=['↑','↓','→','!','∅'];
const ROOM_LBL=['Rising','Falling','Stable','Spike','Flat'];

// ── STATE ───────────────────────────────────────────────────────
let S={
  client:'',activity:'',sess:1,groupCount:4,
  activeGroup:'G1',
  // participants: [{name, group}]
  participants:[],
  shSel:null,shConf:null,shPart:null,
  orgSel:null,orgConf:null,
  log:[],
  startTime:Date.now()
};
let addGroupSel=null;
let slTimer=null;

function load(){
  try{
    const d=localStorage.getItem('fm2');
    if(d){const p=JSON.parse(d);Object.assign(S,p);S.startTime=Date.now();}
  }catch(e){}
}
function persist(){
  const d=Object.assign({},S);delete d.startTime;
  localStorage.setItem('fm2',JSON.stringify(d));
}
function ts(){
  const e=Math.floor((Date.now()-S.startTime)/1000);
  return String(Math.floor(e/60)).padStart(2,'0')+':'+String(e%60).padStart(2,'0');
}
function groupParticipants(g){
  return S.participants.filter(p=>p.group===g);
}

// ── INIT ────────────────────────────────────────────────────────
function init(){
  load();
  buildAll();
  if(!S.client) openSettings();
}

function buildAll(){
  updateHeader();
  buildGroupBars();
  buildPA8();
  buildShadow();
  buildOrg();
  buildLogTab();
  refreshParticipantRow();
}

function updateHeader(){
  document.getElementById('hdr-client').textContent=S.client||'FlowMatrix';
  document.getElementById('hdr-meta').textContent=(S.activity||'No activity')+'  ·  S'+S.sess;
}

// ── GROUP BARS ──────────────────────────────────────────────────
function buildGroupBars(){
  ['pa8-groups','sh-groups','org-groups'].forEach(id=>renderGroupBar(id));
}
function renderGroupBar(id){
  const el=document.getElementById(id);
  if(!el)return;
  el.innerHTML='';
  for(let i=1;i<=S.groupCount;i++){
    const g='G'+i;
    const b=document.createElement('button');
    b.className='g-btn'+(S.activeGroup===g?' active':'');
    b.textContent=g;
    b.onclick=()=>setGroup(g);
    el.appendChild(b);
  }
}
function setGroup(g){
  S.activeGroup=g;
  document.querySelectorAll('.g-btn').forEach(b=>b.classList.toggle('active',b.textContent===g));
  refreshParticipantRow();
}

// ── PA8 ─────────────────────────────────────────────────────────
function buildPA8(){
  const grid=document.getElementById('pa8-grid');
  grid.innerHTML='';
  PA8_DATA.forEach(layer=>{
    const b=document.createElement('button');
    b.className='pa8-btn';
    b.innerHTML=`<span class="pa8-code">${layer.code}</span><span class="pa8-label">${layer.label}</span>`;
    b.onclick=()=>tapPA8(layer);
    grid.appendChild(b);
  });
}
function tapPA8(layer){
  clearTimeout(slTimer);
  const strip=document.getElementById('sublayer-strip');
  document.getElementById('sl-title').textContent=layer.code+' — pick sub-layer or skip';
  const btns=document.getElementById('sl-btns');
  btns.innerHTML='';
  layer.sub.forEach(sl=>{
    const b=document.createElement('button');
    b.className='sl-btn';
    b.innerHTML=`<div>${sl[0]}</div><div style="font-size:9px;color:#888;margin-top:1px">${sl[1]}</div>`;
    b.onclick=()=>{logPA8(layer,sl[0]);hideSL();};
    btns.appendChild(b);
  });
  const skip=document.createElement('button');
  skip.className='sl-btn sl-skip';skip.textContent='—';
  skip.onclick=()=>{logPA8(layer,null);hideSL();};
  btns.appendChild(skip);
  strip.classList.add('visible');
  slTimer=setTimeout(()=>{hideSL();logPA8(layer,null);},5000);
}
function hideSL(){
  clearTimeout(slTimer);
  document.getElementById('sublayer-strip').classList.remove('visible');
}
function logPA8(layer,sub){
  const entry=ts()+' '+S.activeGroup+' '+layer.code+(sub?'·'+sub:'');
  addLog(entry,'pa8');
  flash('pa8-last',entry);
}

// ── SHADOW ──────────────────────────────────────────────────────
function buildShadow(){
  const grid=document.getElementById('sh-grid');
  grid.innerHTML='';
  SH_DATA.forEach(sh=>{
    const b=document.createElement('button');
    b.className='sh-btn';b.dataset.code=sh.code;
    b.innerHTML=`<span class="sh-code">${sh.code}</span><span class="sh-label">${sh.label}</span>`;
    b.onclick=()=>selSh(sh.code,b);
    grid.appendChild(b);
  });
  buildConf('sh-conf','shConf',updateShBtn);
}
function buildConf(rowId,stateKey,cb){
  const row=document.getElementById(rowId);
  row.innerHTML='';
  [['L','Low'],['M','Medium'],['H','High']].forEach(([c,l])=>{
    const b=document.createElement('button');
    b.className='conf-btn';b.dataset.val=c;
    b.innerHTML=c+`<span class="conf-sub">${l}</span>`;
    b.onclick=()=>{
      S[stateKey]=c;
      document.querySelectorAll('#'+rowId+' .conf-btn').forEach(x=>x.classList.toggle('selected',x.dataset.val===c));
      cb();
    };
    row.appendChild(b);
  });
}
function selSh(code,btn){
  S.shSel=code;
  document.querySelectorAll('#sh-grid .sh-btn').forEach(b=>b.classList.toggle('selected',b.dataset.code===code));
  updateShBtn();
}
function selShPart(code,btn){
  S.shPart=code;
  document.querySelectorAll('#sh-prow .p-btn').forEach(b=>b.classList.toggle('selected',b.dataset.code===code));
  updateShBtn();
}
function updateShBtn(){
  const ready=S.shSel&&S.shConf&&S.shPart;
  document.getElementById('sh-log-btn').classList.toggle('ready',!!ready);
}
function logShadow(){
  if(!S.shSel||!S.shConf||!S.shPart)return;
  const entry=ts()+' '+S.activeGroup+' ['+S.shPart+'-'+S.shSel+'·'+S.shConf+']';
  addLog(entry,'shadow');
  flash('sh-last',entry);
  S.shSel=null;S.shConf=null;S.shPart=null;
  document.querySelectorAll('#sh-grid .sh-btn,#sh-conf .conf-btn,#sh-prow .p-btn')
    .forEach(b=>b.classList.remove('selected'));
  updateShBtn();
}
function refreshParticipantRow(){
  const row=document.getElementById('sh-prow');
  if(!row)return;
  row.innerHTML='';
  const members=groupParticipants(S.activeGroup);
  if(members.length===0){
    const empty=document.createElement('span');
    empty.className='p-row-empty';
    empty.textContent='No participants in '+S.activeGroup+' — tap + to add';
    row.appendChild(empty);
    return;
  }
  members.forEach(p=>{
    const b=document.createElement('button');
    b.className='p-btn';b.dataset.code=p.name;
    b.textContent=p.name.substring(0,4).toUpperCase();
    b.title=p.name;
    b.onclick=()=>selShPart(p.name,b);
    row.appendChild(b);
  });
}

// ── ORG ─────────────────────────────────────────────────────────
function buildOrg(){
  const grid=document.getElementById('org-grid');
  grid.innerHTML='';
  ORG_DATA.forEach(dyn=>{
    const b=document.createElement('button');
    b.className='org-btn';b.dataset.code=dyn.code;
    b.innerHTML=`<span class="org-code">${dyn.code}</span><span class="org-label">${dyn.label.replace('\n','<br>')}</span>`;
    b.onclick=()=>{
      S.orgSel=dyn.code;
      document.querySelectorAll('#org-grid .org-btn').forEach(x=>x.classList.toggle('selected',x.dataset.code===dyn.code));
      updateOrgBtn();
    };
    grid.appendChild(b);
  });
  buildConf('org-conf','orgConf',updateOrgBtn);
}
function updateOrgBtn(){
  document.getElementById('org-log-btn').classList.toggle('ready',!!(S.orgSel&&S.orgConf));
}
function logOrg(){
  if(!S.orgSel)return;
  const conf=S.orgConf||'L';
  const entry=ts()+' '+S.activeGroup+' ORG['+S.orgSel+'·'+conf+'] S'+S.sess;
  addLog(entry,'org');
  flash('org-last',entry);
  S.orgSel=null;S.orgConf=null;
  document.querySelectorAll('#org-grid .org-btn,#org-conf .conf-btn').forEach(b=>b.classList.remove('selected'));
  updateOrgBtn();
}

// ── LOG ─────────────────────────────────────────────────────────
function buildLogTab(){
  const rr=document.getElementById('room-row');
  rr.innerHTML='';
  ROOM_SYMS.forEach((sym,i)=>{
    const b=document.createElement('button');
    b.className='room-btn';
    b.innerHTML=sym+`<span class="rlabel">${ROOM_LBL[i]}</span>`;
    b.onclick=()=>{addLog(ts()+' ROOM '+sym,'room');renderLog();};
    rr.appendChild(b);
  });
  renderLog();
}
function addLog(entry,type){
  S.log.push({entry,type});
  persist();
  renderLog();
}
function renderLog(){
  const list=document.getElementById('log-list');
  list.innerHTML='';
  S.log.forEach(item=>{
    const div=document.createElement('div');
    div.className='log-entry';
    const parts=item.entry.split(' ');
    let html=`<span class="lt">${parts[0]}</span> `;
    if(parts[1]&&parts[1].startsWith('G')){
      html+=`<span class="lg">${parts[1]}</span> `;
      const rest=parts.slice(2).join(' ');
      html+=rest.startsWith('[')?`<span class="lsh">${rest}</span>`:`<span class="ls">${rest}</span>`;
    } else {
      html+=`<span style="color:#aaa">${parts.slice(1).join(' ')}</span>`;
    }
    div.innerHTML=html;
    list.appendChild(div);
  });
  list.scrollTop=list.scrollHeight;
}
function copyLog(){
  const lines=['FLOWMATRIX FIELD LOG','Client: '+S.client,'Activity: '+S.activity,
    'Session: '+S.sess,'Date: '+new Date().toLocaleDateString(),'','ENTRIES:'];
  S.log.forEach(i=>lines.push(i.entry));
  const text=lines.join('\n');
  const btn=document.getElementById('copy-btn');
  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(()=>{
      btn.textContent='✓ COPIED';btn.classList.add('copied');
      setTimeout(()=>{btn.textContent='COPY SESSION LOG';btn.classList.remove('copied');},2000);
    });
  } else {
    const ta=document.createElement('textarea');
    ta.value=text;document.body.appendChild(ta);ta.select();
    document.execCommand('copy');document.body.removeChild(ta);
    btn.textContent='✓ COPIED';btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='COPY SESSION LOG';btn.classList.remove('copied');},2000);
  }
}

// ── ADD PARTICIPANT ─────────────────────────────────────────────
function openAdd(){
  addGroupSel=S.activeGroup;
  document.getElementById('add-name-input').value='';
  const row=document.getElementById('add-group-row');
  row.innerHTML='';
  for(let i=1;i<=S.groupCount;i++){
    const g='G'+i;
    const b=document.createElement('button');
    b.className='mg-btn'+(g===addGroupSel?' selected':'');
    b.textContent=g;b.dataset.g=g;
    b.onclick=()=>{
      addGroupSel=g;
      document.querySelectorAll('.mg-btn').forEach(x=>x.classList.toggle('selected',x.dataset.g===g));
      updateAddBtn();
    };
    row.appendChild(b);
  }
  updateAddBtn();
  document.getElementById('add-modal').classList.add('open');
  setTimeout(()=>document.getElementById('add-name-input').focus(),200);
}
function updateAddBtn(){
  const name=document.getElementById('add-name-input').value.trim();
  document.getElementById('add-confirm-btn').classList.toggle('ready',!!(name&&addGroupSel));
}
function confirmAdd(){
  const name=document.getElementById('add-name-input').value.trim();
  if(!name||!addGroupSel)return;
  S.participants.push({name,group:addGroupSel});
  persist();
  closeAdd();
  refreshParticipantRow();
  updateSettingsPList();
  addLog(ts()+' ADDED '+name+' → '+addGroupSel,'system');
}
function closeAdd(){
  document.getElementById('add-modal').classList.remove('open');
}

// ── SETTINGS ────────────────────────────────────────────────────
function openSettings(){
  document.getElementById('s-client').value=S.client;
  document.getElementById('s-activity').value=S.activity;
  document.getElementById('s-sess').value=S.sess;
  document.getElementById('s-groups').value=S.groupCount;
  updateSettingsPList();
  document.getElementById('settings-overlay').classList.add('open');
}
function updateSettingsPList(){
  const el=document.getElementById('s-p-list');
  if(S.participants.length===0){
    el.textContent='No participants added yet — use + button during session';
    return;
  }
  const grouped={};
  S.participants.forEach(p=>{
    if(!grouped[p.group])grouped[p.group]=[];
    grouped[p.group].push(p.name);
  });
  el.innerHTML=Object.keys(grouped).sort().map(g=>
    `<div style="margin-bottom:4px"><span style="color:var(--redl);font-weight:700">${g}:</span> ${grouped[g].join(', ')}</div>`
  ).join('');
}
function saveSettings(){
  S.client=document.getElementById('s-client').value.trim();
  S.activity=document.getElementById('s-activity').value.trim();
  S.sess=parseInt(document.getElementById('s-sess').value)||1;
  S.groupCount=parseInt(document.getElementById('s-groups').value);
  S.startTime=Date.now();
  persist();
  document.getElementById('settings-overlay').classList.remove('open');
  buildAll();
}
function clearSession(){
  if(!confirm('Clear log and participants? Settings kept.'))return;
  S.log=[];S.participants=[];S.shSel=null;S.shConf=null;S.shPart=null;
  S.orgSel=null;S.orgConf=null;S.startTime=Date.now();
  persist();
  document.getElementById('settings-overlay').classList.remove('open');
  buildAll();
}

// ── TABS ────────────────────────────────────────────────────────
function switchTab(name,btn){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='log')renderLog();
}

// ── FLASH ───────────────────────────────────────────────────────
function flash(id,text){
  const el=document.getElementById(id);
  el.textContent=text;el.classList.add('flash');
  setTimeout(()=>{el.classList.remove('flash');el.textContent='—';},2500);
}

// ── KEYBOARD — close modal on Enter ─────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    if(document.getElementById('add-modal').classList.contains('open'))confirmAdd();
  }
  if(e.key==='Escape'){
    closeAdd();
    document.getElementById('settings-overlay').classList.remove('open');
  }
});

init();
</script>
</body>
