<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>FlowMatrix Field App</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --black: #111111;
    --dark: #1A1A1A;
    --card: #222222;
    --border: #333333;
    --red: #8B1A1A;
    --red-light: #B02020;
    --grey: #888888;
    --lgrey: #AAAAAA;
    --white: #F5F5F5;
    --green: #2A6A3A;
    --tab-h: 56px;
    --header-h: 48px;
  }

  html, body {
    height: 100%; width: 100%;
    background: var(--black);
    color: var(--white);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    overflow: hidden;
    touch-action: manipulation;
  }

  /* ── LAYOUT ── */
  #app { display: flex; flex-direction: column; height: 100vh; width: 100vw; }

  #header {
    height: var(--header-h);
    background: var(--dark);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 14px;
    flex-shrink: 0;
  }
  #header-left { font-size: 11px; color: var(--grey); line-height: 1.4; }
  #header-left span { display: block; color: var(--lgrey); font-size: 12px; font-weight: 600; }
  #settings-btn {
    background: var(--card); border: 1px solid var(--border);
    color: var(--lgrey); font-size: 13px; padding: 6px 14px;
    border-radius: 8px; cursor: pointer;
  }

  #content { flex: 1; overflow: hidden; position: relative; }

  .tab-panel {
    position: absolute; inset: 0;
    display: none; flex-direction: column;
    padding: 10px 12px 8px;
    gap: 8px;
  }
  .tab-panel.active { display: flex; }

  /* ── TAB BAR ── */
  #tabbar {
    height: var(--tab-h);
    background: var(--dark);
    border-top: 1px solid var(--border);
    display: grid; grid-template-columns: repeat(4, 1fr);
    flex-shrink: 0;
  }
  .tab-btn {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 3px; cursor: pointer; border: none; background: transparent;
    color: var(--grey); font-size: 10px; font-weight: 500;
    transition: color 0.15s;
  }
  .tab-btn .tab-icon { font-size: 18px; line-height: 1; }
  .tab-btn.active { color: var(--red-light); }

  /* ── GROUP SELECTOR ── */
  .group-bar {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
    flex-shrink: 0;
  }
  .g-btn {
    padding: 10px 4px; border-radius: 10px;
    background: var(--card); border: 1.5px solid var(--border);
    color: var(--lgrey); font-size: 14px; font-weight: 700;
    cursor: pointer; text-align: center; transition: all 0.15s;
  }
  .g-btn.active {
    background: var(--red); border-color: var(--red-light);
    color: var(--white);
  }

  /* ── PA-8 GRID ── */
  .pa8-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px;
    flex: 1;
  }
  .pa8-btn {
    border-radius: 12px; border: 1.5px solid var(--border);
    background: var(--card); color: var(--white);
    cursor: pointer; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 4px;
    padding: 8px 4px; transition: all 0.12s;
    -webkit-user-select: none;
  }
  .pa8-btn:active { transform: scale(0.94); background: var(--red); border-color: var(--red-light); }
  .pa8-code { font-size: 18px; font-weight: 800; letter-spacing: 0.5px; }
  .pa8-label { font-size: 10px; color: var(--grey); text-align: center; line-height: 1.2; }

  /* ── SUB-LAYER STRIP ── */
  #sublayer-strip {
    display: none;
    background: var(--dark);
    border: 1.5px solid var(--red);
    border-radius: 12px;
    padding: 8px;
    flex-shrink: 0;
  }
  #sublayer-strip.visible { display: block; }
  #sublayer-title { font-size: 11px; color: var(--grey); margin-bottom: 7px; text-align: center; }
  #sublayer-btns { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .sl-btn {
    background: var(--card); border: 1px solid var(--border);
    color: var(--white); font-size: 12px; font-weight: 600;
    padding: 9px 4px; border-radius: 8px; cursor: pointer;
    text-align: center;
  }
  .sl-btn:active { background: var(--red); }
  .sl-skip { color: var(--grey); font-size: 11px; }

  /* ── LAST ENTRY FLASH ── */
  .last-entry {
    height: 32px; display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: var(--lgrey); flex-shrink: 0;
    background: var(--dark); border-radius: 8px; border: 1px solid var(--border);
    font-family: 'Courier New', monospace;
  }
  .last-entry.flash { color: var(--green); border-color: var(--green); }

  /* ── SHADOW TAB ── */
  .shadow-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
    flex-shrink: 0;
  }
  .sh-btn {
    background: var(--card); border: 1.5px solid var(--border);
    color: var(--white); border-radius: 10px;
    padding: 9px 4px; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    transition: all 0.12s;
  }
  .sh-btn:active, .sh-btn.selected { background: var(--red); border-color: var(--red-light); }
  .sh-code { font-size: 14px; font-weight: 800; }
  .sh-label { font-size: 9px; color: var(--grey); text-align: center; line-height: 1.2; }
  .sh-btn.selected .sh-label { color: #ffaaaa; }

  .conf-row {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;
    flex-shrink: 0;
  }
  .conf-btn {
    padding: 11px; border-radius: 10px; border: 1.5px solid var(--border);
    background: var(--card); color: var(--white); font-size: 14px; font-weight: 700;
    cursor: pointer; text-align: center; transition: all 0.12s;
  }
  .conf-btn:active, .conf-btn.selected { border-color: var(--red-light); background: var(--red); }
  .conf-sub { font-size: 9px; color: var(--grey); display: block; margin-top: 2px; }
  .conf-btn.selected .conf-sub { color: #ffaaaa; }

  .participant-row {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px;
    flex-shrink: 0;
  }
  .p-btn {
    padding: 10px 4px; border-radius: 10px; border: 1.5px solid var(--border);
    background: var(--card); color: var(--white); font-size: 12px; font-weight: 700;
    cursor: pointer; text-align: center; transition: all 0.12s;
  }
  .p-btn:active, .p-btn.selected { background: var(--red); border-color: var(--red-light); }
  .p-add {
    background: transparent; border: 1.5px dashed var(--border);
    color: var(--grey); font-size: 18px;
  }

  .sh-log-btn {
    background: var(--green); border: none; border-radius: 12px;
    color: var(--white); font-size: 15px; font-weight: 700;
    padding: 14px; cursor: pointer; flex-shrink: 0;
    opacity: 0.5;
  }
  .sh-log-btn.ready { opacity: 1; }

  /* ── ORG TAB ── */
  .org-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px;
    flex: 1;
  }
  .org-btn {
    border-radius: 12px; border: 1.5px solid var(--border);
    background: var(--card); color: var(--white);
    cursor: pointer; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 4px;
    padding: 8px 4px; transition: all 0.12s;
  }
  .org-btn:active, .org-btn.selected { background: var(--red); border-color: var(--red-light); }
  .org-code { font-size: 15px; font-weight: 800; }
  .org-label { font-size: 9px; color: var(--grey); text-align: center; line-height: 1.2; }
  .org-btn.selected .org-label { color: #ffaaaa; }

  .session-row {
    display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
    flex-shrink: 0;
  }
  .session-info {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px;
    font-size: 11px; color: var(--grey);
  }
  .session-info span { display: block; color: var(--white); font-size: 14px; font-weight: 700; }

  /* ── LOG TAB ── */
  .log-list {
    flex: 1; overflow-y: auto; background: var(--dark);
    border-radius: 12px; border: 1px solid var(--border);
    padding: 8px;
    font-family: 'Courier New', monospace; font-size: 12px;
    color: var(--lgrey); line-height: 1.8;
  }
  .log-list:empty::after { content: 'No entries yet'; color: var(--border); font-size: 11px; }
  .log-entry { border-bottom: 1px solid #2A2A2A; padding: 3px 0; }
  .log-entry:last-child { border-bottom: none; }
  .log-time { color: var(--grey); }
  .log-group { color: var(--red-light); font-weight: 700; }
  .log-signal { color: var(--white); font-weight: 600; }
  .log-shadow { color: #88AAFF; }

  .room-row {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px;
    flex-shrink: 0;
  }
  .room-btn {
    background: var(--card); border: 1.5px solid var(--border);
    color: var(--white); font-size: 18px; font-weight: 700;
    padding: 10px; border-radius: 10px; cursor: pointer;
    text-align: center;
  }
  .room-btn:active { background: #333; }
  .room-label { font-size: 9px; color: var(--grey); display: block; margin-top: 2px; }

  .copy-btn {
    background: var(--red); border: none; border-radius: 12px;
    color: var(--white); font-size: 15px; font-weight: 700;
    padding: 14px; cursor: pointer; flex-shrink: 0;
  }
  .copy-btn:active { background: var(--red-light); }
  .copy-btn.copied { background: var(--green); }

  /* ── SETTINGS OVERLAY ── */
  #settings-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.92); z-index: 100;
    flex-direction: column; padding: 16px;
    gap: 10px; overflow-y: auto;
  }
  #settings-overlay.open { display: flex; }
  .settings-title { font-size: 18px; font-weight: 700; color: var(--white); margin-bottom: 4px; }
  .settings-section { font-size: 11px; color: var(--grey); margin-top: 6px; }
  .settings-field {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px;
    color: var(--white); font-size: 15px; width: 100%;
    outline: none;
  }
  .settings-field:focus { border-color: var(--red); }
  .p-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .p-field-wrap { display: flex; align-items: center; gap: 8px; }
  .p-code { color: var(--red-light); font-weight: 700; font-size: 13px; width: 28px; flex-shrink: 0; }
  .save-btn {
    background: var(--red); border: none; border-radius: 12px;
    color: var(--white); font-size: 16px; font-weight: 700;
    padding: 16px; cursor: pointer; margin-top: 8px;
  }
  .section-divider {
    height: 1px; background: var(--border); margin: 4px 0;
  }
  .new-session-btn {
    background: transparent; border: 1.5px solid var(--border);
    border-radius: 12px; color: var(--grey); font-size: 14px;
    padding: 12px; cursor: pointer;
  }
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div id="header">
    <div id="header-left">
      <span id="hdr-client">FlowMatrix</span>
      <span id="hdr-meta">Tap Settings to configure</span>
    </div>
    <button id="settings-btn" onclick="openSettings()">⚙ Settings</button>
  </div>

  <!-- CONTENT -->
  <div id="content">

    <!-- PA-8 TAB -->
    <div id="tab-pa8" class="tab-panel active">
      <div class="group-bar" id="pa8-groups"></div>
      <div class="pa8-grid" id="pa8-grid"></div>
      <div id="sublayer-strip">
        <div id="sublayer-title"></div>
        <div id="sublayer-btns"></div>
      </div>
      <div class="last-entry" id="pa8-last">—</div>
    </div>

    <!-- SHADOW TAB -->
    <div id="tab-shadow" class="tab-panel">
      <div class="group-bar" id="sh-groups"></div>
      <div class="shadow-grid" id="shadow-grid"></div>
      <div class="conf-row" id="conf-row"></div>
      <div class="participant-row" id="p-row"></div>
      <button class="sh-log-btn" id="sh-log-btn" onclick="logShadow()">LOG SHADOW ENTRY</button>
      <div class="last-entry" id="sh-last">—</div>
    </div>

    <!-- ORG TAB -->
    <div id="tab-org" class="tab-panel">
      <div class="session-row">
        <div class="session-info">Session <span id="org-sess">1</span></div>
        <div class="session-info">Engagement <span id="org-eng">—</span></div>
      </div>
      <div class="org-grid" id="org-grid"></div>
      <div class="conf-row" id="org-conf-row"></div>
      <button class="sh-log-btn" id="org-log-btn" onclick="logOrg()">LOG ORG DYNAMIC</button>
      <div class="last-entry" id="org-last">—</div>
    </div>

    <!-- LOG TAB -->
    <div id="tab-log" class="tab-panel">
      <div class="room-row" id="room-row"></div>
      <div class="log-list" id="log-list"></div>
      <button class="copy-btn" id="copy-btn" onclick="copyLog()">COPY SESSION LOG</button>
    </div>

  </div>

  <!-- TAB BAR -->
  <div id="tabbar">
    <button class="tab-btn active" onclick="switchTab('pa8',this)">
      <span class="tab-icon">⬡</span>PA-8
    </button>
    <button class="tab-btn" onclick="switchTab('shadow',this)">
      <span class="tab-icon">◈</span>SHADOW
    </button>
    <button class="tab-btn" onclick="switchTab('org',this)">
      <span class="tab-icon">⬡⬡</span>ORG
    </button>
    <button class="tab-btn" onclick="switchTab('log',this)">
      <span class="tab-icon">≡</span>LOG
    </button>
  </div>

</div>

<!-- SETTINGS OVERLAY -->
<div id="settings-overlay">
  <div class="settings-title">⚙ Session Settings</div>
  <div class="section-divider"></div>

  <div class="settings-section">CLIENT / ENGAGEMENT</div>
  <input class="settings-field" id="s-client" placeholder="Client name or code" />
  <input class="settings-field" id="s-activity" placeholder="Activity name" />

  <div class="settings-section">SESSION NUMBER &amp; ACTIVE GROUPS</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
    <input class="settings-field" id="s-sessnum" placeholder="Session #" type="number" value="1" />
    <select class="settings-field" id="s-groups">
      <option value="2">2 Groups</option>
      <option value="3">3 Groups</option>
      <option value="4" selected>4 Groups</option>
    </select>
  </div>

  <div class="settings-section">PARTICIPANT NAMES (enter before session)</div>
  <div class="p-grid" id="p-name-grid"></div>

  <div class="section-divider"></div>
  <button class="save-btn" onclick="saveSettings()">SAVE &amp; START</button>
  <button class="new-session-btn" onclick="newSession()">↺ Clear Log — New Session</button>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────
const PA8 = [
  { code:'FR', label:'Friction', sub:[['Ro-Fr','Role'],['De-Fr','Decision'],['Fl-Fr','Flow']] },
  { code:'DR', label:'Drift',    sub:[['In-Dr','Intent'],['Lo-Dr','Logic'],['Ro-Dr','Role']] },
  { code:'FG', label:'Fragment', sub:[['De-Fg','Decision'],['Ro-Fg','Role'],['Le-Fg','Leadership']] },
  { code:'FC', label:'Fracture', sub:[['Ro-Fc','Role'],['De-Fc','Decision'],['Tr-Fc','Trust']] },
  { code:'CO', label:'Collapse', sub:[['De-Co','Decision'],['Ro-Co','Role'],['In-Co','Info']] },
  { code:'BR', label:'Break',    sub:[['Co-Br','Conflict'],['Ch-Br','Chaos'],['Ov-Br','Overdrive']] },
];

const SHADOW = [
  { code:'AN', label:'Anchor',   desc:'Informal authority' },
  { code:'VT', label:'Veto',     desc:'Blocks quietly' },
  { code:'BK', label:'Broker',   desc:'Controls info' },
  { code:'SH', label:'Shield',   desc:'Absorbs blame' },
  { code:'MI', label:'Mirror',   desc:'Reflects power' },
  { code:'EX', label:'Exile',    desc:'Marginalised' },
  { code:'HO', label:'H.Override',desc:'Cultural auth' },
];

const ORG = [
  { code:'PT', label:'Power\nTopology',   desc:'Real authority map' },
  { code:'UR', label:'Unwritten\nRule',   desc:'Unspoken norm' },
  { code:'PS', label:'Protected\nStory',  desc:'Unchallengeable narrative' },
  { code:'IA', label:'Informal\nAlliance',desc:'Hidden relationships' },
  { code:'SF', label:'Scapegoat\nFn.',    desc:'Carries failure' },
  { code:'FM', label:'Frozen\nMoment',    desc:'Past governing present' },
];

const ROOM = ['↑','↓','→','!','∅'];
const ROOM_LABELS = ['Rising','Falling','Stable','Spike','Flat'];

// ── STATE ─────────────────────────────────────────────────────────────────
let state = {
  client: '', activity: '', sessNum: 1, groupCount: 4,
  participants: ['','','','','','','',''],
  activeGroup: 'G1',
  shadowSel: null, confSel: null, partSel: null,
  orgSel: null, orgConf: null,
  pendingPA8: null,
  log: [],
  startTime: Date.now()
};

function load() {
  const s = localStorage.getItem('fm_state');
  if (s) { try { const p = JSON.parse(s); Object.assign(state, p); state.startTime = Date.now(); } catch(e){} }
}
function save() {
  const toSave = Object.assign({}, state); delete toSave.startTime;
  localStorage.setItem('fm_state', JSON.stringify(toSave));
}
function ts() {
  const e = Math.floor((Date.now() - state.startTime) / 1000);
  const m = String(Math.floor(e/60)).padStart(2,'0');
  const s = String(e%60).padStart(2,'0');
  return m+':'+s;
}
function pName(code) {
  const i = parseInt(code.replace('P',''))-1;
  return (state.participants[i] && state.participants[i].trim()) ? state.participants[i].trim() : code;
}

// ── BUILD UI ──────────────────────────────────────────────────────────────
function buildAll() {
  buildGroups();
  buildPA8();
  buildShadow();
  buildOrg();
  buildLog();
  updateHeader();
}

function buildGroups() {
  ['pa8-groups','sh-groups'].forEach(id => {
    const el = document.getElementById(id);
    el.innerHTML = '';
    for (let i = 1; i <= state.groupCount; i++) {
      const g = 'G'+i;
      const b = document.createElement('button');
      b.className = 'g-btn' + (state.activeGroup === g ? ' active' : '');
      b.textContent = g;
      b.onclick = () => setGroup(g);
      el.appendChild(b);
    }
  });
}

function setGroup(g) {
  state.activeGroup = g;
  document.querySelectorAll('.g-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === g);
  });
}

function buildPA8() {
  const grid = document.getElementById('pa8-grid');
  grid.innerHTML = '';
  PA8.forEach(layer => {
    const b = document.createElement('button');
    b.className = 'pa8-btn';
    b.innerHTML = `<span class="pa8-code">${layer.code}</span><span class="pa8-label">${layer.label}</span>`;
    b.onclick = () => tapPA8(layer);
    grid.appendChild(b);
  });
}

let sublayerTimer = null;
function tapPA8(layer) {
  state.pendingPA8 = layer;
  clearTimeout(sublayerTimer);
  const strip = document.getElementById('sublayer-strip');
  const title = document.getElementById('sublayer-title');
  const btns  = document.getElementById('sublayer-btns');
  title.textContent = layer.code + ' — select sub-layer or skip';
  btns.innerHTML = '';
  layer.sub.forEach(sl => {
    const b = document.createElement('button');
    b.className = 'sl-btn';
    b.innerHTML = `<div>${sl[0]}</div><div style="font-size:9px;color:#888;margin-top:2px">${sl[1]}</div>`;
    b.onclick = () => { logPA8(layer, sl[0]); hideSubLayer(); };
    btns.appendChild(b);
  });
  const skip = document.createElement('button');
  skip.className = 'sl-btn sl-skip'; skip.textContent = '—';
  skip.onclick = () => { logPA8(layer, null); hideSubLayer(); };
  btns.appendChild(skip);
  strip.classList.add('visible');
  sublayerTimer = setTimeout(() => { hideSubLayer(); logPA8(layer, null); }, 5000);
}

function hideSubLayer() {
  clearTimeout(sublayerTimer);
  document.getElementById('sublayer-strip').classList.remove('visible');
}

function logPA8(layer, sub) {
  const entry = ts() + ' ' + state.activeGroup + ' ' + layer.code + (sub ? '·'+sub : '');
  addLog(entry, 'pa8');
  flashLast('pa8-last', entry);
}

function buildShadow() {
  // Pattern grid
  const grid = document.getElementById('shadow-grid');
  grid.innerHTML = '';
  SHADOW.forEach(sh => {
    const b = document.createElement('button');
    b.className = 'sh-btn';
    b.dataset.code = sh.code;
    b.innerHTML = `<span class="sh-code">${sh.code}</span><span class="sh-label">${sh.label}</span>`;
    b.onclick = () => selShadow(sh.code, b);
    grid.appendChild(b);
  });

  // Confidence
  const conf = document.getElementById('conf-row');
  conf.innerHTML = '';
  [['L','Low'],['M','Medium'],['H','High']].forEach(([c,l]) => {
    const b = document.createElement('button');
    b.className = 'conf-btn'; b.dataset.val = c;
    b.innerHTML = c + '<span class="conf-sub">'+l+'</span>';
    b.onclick = () => selConf(c, b, 'conf-row', 'confSel');
    conf.appendChild(b);
  });

  // Participants
  buildParticipantRow();
}

function buildParticipantRow() {
  const row = document.getElementById('p-row');
  row.innerHTML = '';
  for (let i = 1; i <= 8; i++) {
    const name = state.participants[i-1];
    if (!name && i > 1 && !state.participants[i-2]) break;
    const b = document.createElement('button');
    b.className = 'p-btn'; b.dataset.code = 'P'+i;
    b.textContent = name ? name.substring(0,3).toUpperCase() : 'P'+i;
    b.title = 'P'+i + (name ? ' = '+name : '');
    b.onclick = () => selPart('P'+i, b);
    row.appendChild(b);
  }
  // Add button
  const add = document.createElement('button');
  add.className = 'p-btn p-add'; add.textContent = '+';
  add.onclick = () => quickAddParticipant();
  row.appendChild(add);
}

function selShadow(code, btn) {
  state.shadowSel = code;
  document.querySelectorAll('#shadow-grid .sh-btn').forEach(b => b.classList.toggle('selected', b.dataset.code === code));
  updateShadowBtn();
}
function selConf(val, btn, rowId, stateKey) {
  state[stateKey] = val;
  document.querySelectorAll('#'+rowId+' .conf-btn').forEach(b => b.classList.toggle('selected', b.dataset.val === val));
  updateShadowBtn();
}
function selPart(code, btn) {
  state.partSel = code;
  document.querySelectorAll('#p-row .p-btn').forEach(b => b.classList.toggle('selected', b.dataset.code === code));
  updateShadowBtn();
}
function updateShadowBtn() {
  const ready = state.shadowSel && state.confSel && state.partSel;
  document.getElementById('sh-log-btn').classList.toggle('ready', !!ready);
}
function logShadow() {
  if (!state.shadowSel || !state.confSel || !state.partSel) return;
  const name = pName(state.partSel);
  const entry = ts() + ' ' + state.activeGroup + ' ['+name+'-'+state.shadowSel+'·'+state.confSel+']';
  addLog(entry, 'shadow');
  flashLast('sh-last', entry);
  // Reset
  state.shadowSel = null; state.confSel = null; state.partSel = null;
  document.querySelectorAll('.sh-btn, #conf-row .conf-btn, #p-row .p-btn').forEach(b => b.classList.remove('selected'));
  updateShadowBtn();
}

function quickAddParticipant() {
  const name = prompt('Enter participant name or initials:');
  if (!name) return;
  const idx = state.participants.findIndex(p => !p);
  if (idx !== -1) { state.participants[idx] = name; save(); buildParticipantRow(); }
}

function buildOrg() {
  const grid = document.getElementById('org-grid');
  grid.innerHTML = '';
  ORG.forEach(dyn => {
    const b = document.createElement('button');
    b.className = 'org-btn'; b.dataset.code = dyn.code;
    b.innerHTML = `<span class="org-code">${dyn.code}</span><span class="org-label">${dyn.label.replace('\n','<br>')}</span>`;
    b.onclick = () => selOrg(dyn.code, b);
    grid.appendChild(b);
  });

  const conf = document.getElementById('org-conf-row');
  conf.innerHTML = '';
  [['L','Low'],['M','Medium'],['H','High']].forEach(([c,l]) => {
    const b = document.createElement('button');
    b.className = 'conf-btn'; b.dataset.val = c;
    b.innerHTML = c + '<span class="conf-sub">'+l+'</span>';
    b.onclick = () => selConf(c, b, 'org-conf-row', 'orgConf');
    conf.appendChild(b);
  });

  document.getElementById('org-sess').textContent = state.sessNum;
  document.getElementById('org-eng').textContent = state.client || '—';
}

function selOrg(code, btn) {
  state.orgSel = code;
  document.querySelectorAll('#org-grid .org-btn').forEach(b => b.classList.toggle('selected', b.dataset.code === code));
}
function logOrg() {
  if (!state.orgSel) return;
  const conf = state.orgConf || 'L';
  const entry = ts() + ' ORG ['+state.orgSel+'·'+conf+'] S'+state.sessNum;
  addLog(entry, 'org');
  flashLast('org-last', entry);
  state.orgSel = null; state.orgConf = null;
  document.querySelectorAll('#org-grid .org-btn, #org-conf-row .conf-btn').forEach(b => b.classList.remove('selected'));
}

function buildLog() {
  const rr = document.getElementById('room-row');
  rr.innerHTML = '';
  ROOM.forEach((sym, i) => {
    const b = document.createElement('button');
    b.className = 'room-btn';
    b.innerHTML = sym + '<span class="room-label">'+ROOM_LABELS[i]+'</span>';
    b.onclick = () => logRoom(sym);
    rr.appendChild(b);
  });
  renderLog();
}

function logRoom(sym) {
  const entry = ts() + ' ROOM ' + sym;
  addLog(entry, 'room');
  renderLog();
}

function addLog(entry, type) {
  state.log.push({ entry, type, t: ts() });
  save();
  renderLog();
}

function renderLog() {
  const list = document.getElementById('log-list');
  list.innerHTML = '';
  state.log.forEach(item => {
    const div = document.createElement('div');
    div.className = 'log-entry';
    const parts = item.entry.split(' ');
    let html = '<span class="log-time">'+parts[0]+'</span> ';
    if (parts[1] && parts[1].startsWith('G')) {
      html += '<span class="log-group">'+parts[1]+'</span> ';
      const rest = parts.slice(2).join(' ');
      if (rest.startsWith('[')) {
        html += '<span class="log-shadow">'+rest+'</span>';
      } else {
        html += '<span class="log-signal">'+rest+'</span>';
      }
    } else {
      html += '<span style="color:#aaa">'+parts.slice(1).join(' ')+'</span>';
    }
    div.innerHTML = html;
    list.appendChild(div);
  });
  list.scrollTop = list.scrollHeight;
}

function flashLast(id, text) {
  const el = document.getElementById(id);
  el.textContent = text; el.classList.add('flash');
  setTimeout(() => { el.classList.remove('flash'); el.textContent = '—'; }, 2000);
}

// ── SETTINGS ──────────────────────────────────────────────────────────────
function openSettings() {
  document.getElementById('s-client').value = state.client;
  document.getElementById('s-activity').value = state.activity;
  document.getElementById('s-sessnum').value = state.sessNum;
  document.getElementById('s-groups').value = state.groupCount;
  buildPNameGrid();
  document.getElementById('settings-overlay').classList.add('open');
}

function buildPNameGrid() {
  const grid = document.getElementById('p-name-grid');
  grid.innerHTML = '';
  for (let i = 0; i < 8; i++) {
    const wrap = document.createElement('div');
    wrap.className = 'p-field-wrap';
    wrap.innerHTML = `<span class="p-code">P${i+1}</span>`;
    const inp = document.createElement('input');
    inp.className = 'settings-field';
    inp.style.padding = '10px';
    inp.placeholder = 'Name / initials';
    inp.value = state.participants[i] || '';
    inp.dataset.idx = i;
    wrap.appendChild(inp);
    grid.appendChild(wrap);
  }
}

function saveSettings() {
  state.client = document.getElementById('s-client').value.trim();
  state.activity = document.getElementById('s-activity').value.trim();
  state.sessNum = parseInt(document.getElementById('s-sessnum').value) || 1;
  state.groupCount = parseInt(document.getElementById('s-groups').value);
  document.querySelectorAll('#p-name-grid input').forEach(inp => {
    state.participants[inp.dataset.idx] = inp.value.trim();
  });
  state.startTime = Date.now();
  save();
  document.getElementById('settings-overlay').classList.remove('open');
  buildAll();
}

function newSession() {
  if (!confirm('Clear the session log and start fresh?')) return;
  state.log = [];
  state.startTime = Date.now();
  save();
  document.getElementById('settings-overlay').classList.remove('open');
  buildAll();
}

function updateHeader() {
  document.getElementById('hdr-client').textContent = state.client || 'FlowMatrix';
  document.getElementById('hdr-meta').textContent = (state.activity || 'No activity set') + '  ·  S' + state.sessNum;
}

// ── COPY LOG ──────────────────────────────────────────────────────────────
function copyLog() {
  const lines = ['FLOWMATRIX FIELD LOG','Client: '+state.client,'Activity: '+state.activity,'Session: '+state.sessNum,'Date: '+new Date().toLocaleDateString(),'','ENTRIES:'];
  state.log.forEach(item => lines.push(item.entry));
  const text = lines.join('\n');
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.textContent = '✓ COPIED'; btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'COPY SESSION LOG'; btn.classList.remove('copied'); }, 2000);
    });
  } else {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
  }
}

// ── TABS ──────────────────────────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
  if (name === 'log') renderLog();
}

// ── INIT ──────────────────────────────────────────────────────────────────
load();
buildAll();
if (!state.client) openSettings();
</script>
</body>
</html>
